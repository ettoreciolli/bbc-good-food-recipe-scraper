<div class="browse-tab">
	<h4>Saved recipes</h4>

	<div class="callout alert" ng-show="loadError">{{ loadError }}</div>
	<p ng-show="loading">Loading…</p>
	<p ng-hide="loading || recipes.length || loadError">
		No recipes saved yet. Scrape one on the <a href="#/">Recipe tab</a> and save it.
	</p>

	<ul class="saved-recipe-list" ng-hide="loading">
		<li ng-repeat="recipe in recipes track by recipe.id">
			<div class="saved-recipe-info">
				<span class="saved-recipe-title">{{ recipe.title || recipe.url }}</span>
				<a class="saved-recipe-url" ng-href="{{ recipe.url }}" target="_blank">{{ recipe.url }}</a>
				<span class="saved-recipe-meta">
					{{ recipe.ingredient_count }}
					ingredient{{ recipe.ingredient_count === 1 ? '' : 's' }}
				</span>
			</div>
			<button class="button" ng-click="loadRecipe(recipe)">Load</button>
		</li>
	</ul>
</div>
